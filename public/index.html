    </div>
    /* Cart */
    <div class="cart">
      <h2 class="cart-title">Your cart</h2>
      <!-- Content -->
       <div class="cart-content">
        <div class="cart-box">
          <img src="img/wadza.jpeg" alt="" class="cart-img">
          <div class="detail-box">
            <div class="cart-product-title">kitchen curtain</div>
            <div class="cart-price">$25.00</div>
            <input
             type="number"
             name=""
             id=""
             value="1" 
             class="cart-quantity">
          </div>
          <!-- Remove Item -->
           <i class="bx bx-trash-alt cart-remove"></i>
        </div>
       </div>
    
       <!--Total -->
       <div class="total">
        <div class="total-title">Total</div>
        <div class="total-price">$0</div>
       </div>
       <!-- Buy Button -->
        <button type="button" class="btn-buy">Pay Now</button>
        <!-- Cart Close -->
         <i class="bx bx-x" id="close-cart"></i>
    </div>
  </header>
